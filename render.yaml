services:
  - type: web
    name: srs-evaluation-dashboard
    env: node
    plan: free
    buildCommand: |
      npm install --legacy-peer-deps
      cd frontend && npm install --legacy-peer-deps
      cd ../backend && npm install --legacy-peer-deps --production
      cd ../frontend && npm run build:skip-type-check
      cd ../backend && npm run init-db
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_AUDIT
        value: false
      - key: NPM_CONFIG_FUND
        value: false
    autoDeploy: true